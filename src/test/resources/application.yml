spring:
  jpa:
    hibernate:
      ddl-auto: create-drop # 테스트 종료 후 데이터베이스 정리
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true # 테스트 시 SQL 쿼리 확인

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE  # 테스트용 인메모리 DB (MySQL 호환)
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jwt:
    secret:
      key: ${JWT_SECRET_KEY}
    access:
      expiration: ${JWT_ACCESS_EXPIRATION}
    refresh:
      expiration: ${JWT_REFRESH_EXPIRATION}

